<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drain Gang Quiz V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Start Screen -->
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Drain Gang Quiz V2!</h1>
            <p>Test your knowledge about the Drain Gang!</p>
            <button id="start-btn">Start Quiz</button>
        </div>    

    <!-- Quiz Screen -->
    <div class="screen" id="quiz-screen">
        <div class="quiz-header">
            <h2 id="question">Question will appear here</h2>
            <div class="quiz-info ">
                <p>
                    Question <span id="current-question">1</span> of <span id="total-questions">5</span>
                </p>

                <p>
                    Score: <span id="score">0</span>
                </p>
            </div>
        </div>

    <!-- answers container -->
    <div class="answers-container" id="answers-container">
        <!-- Options will be generated here -->
        <h2>Your Score: <span id="final-score">0</span></h2>
        <button id="restart-btn">Restart Quiz</button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>


    <!--result screen-->
    <div class="screen" id="result-screen">
        <h1>Quiz Results!</h1>
        <div class="result-info">
            <p>Your Score: <span id="final-score">0</span> out of <span id="max-score">5</span></p>

            <div id="result-message">Good hustle! You know your Drain Gang stuff!</div>

        </div>
        <button id="restart-btn">Restart Quiz</button>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
